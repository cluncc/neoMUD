[[item_templates]]
id = "nexus:nexus_chronicle"
name = "The Nexus Chronicle"
short_desc = "A worn leather book with gilt lettering."
long_desc = "A thick volume bound in worn leather, its title pressed in fading gold: 'The Nexus Chronicle: A History.' The pages are yellowed but legible."
keywords = ["chronicle", "book", "history"]
item_type = { type = "Book", content = "The Nexus was not built in a single age, nor by a single hand. It grew, as certain places do, from the accumulated weight of meaning. Where travelers congregate, where paths cross and recross, reality itself thins. The Nexus is the thinnest point of all.\n\nWhat we call the 'Nexus' today is already the fourth city on this site. Each predecessor was absorbed into the one that followed, leaving behind architecture and legend in equal measure.\n\nThe obelisk predates all of them." }
weight = 1.5
value = 150
